# Use root/example as user/password credentials

services:

  adminer:
    image: adminer
    restart: "no"
    ports:
      - 8080:8080
    environment:
      ADMINER_DEFAULT_SERVER: ${ADMINER_DEFAULT_SERVER}
      ADMINER_DESIGN: rmsoft
      # ADMINER_PLUGINS: "tables-filter permanent-login"
      ADMINER_PLUGINS: 'tables-filter dump-json'

  db:
    image: mysql:8.0.46
    restart: "no"